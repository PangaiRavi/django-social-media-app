<!DOCTYPE html>
<html>
<head>

<title>Pangram Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#667eea,#764ba2);
font-family:Arial;
}

.login-card{
width:360px;
padding:35px;
background:white;
border-radius:15px;
box-shadow:0px 8px 25px rgba(0,0,0,0.2);
}

.app-title{
text-align:center;
font-size:28px;
font-weight:bold;
color:#1877f2;
margin-bottom:5px;
}

.subtitle{
text-align:center;
color:gray;
margin-bottom:20px;
}

.btn-primary{
width:100%;
border-radius:10px;
font-weight:bold;
}

.form-control{
border-radius:10px;
}

.signup-link{
text-align:center;
margin-top:15px;
}

</style>

</head>

<body>

<div class="login-card">

<div class="app-title">Pangram</div>
<div class="subtitle">Login to your account</div>

{% if messages %}
{% for message in messages %}
<div class="alert alert-danger">
{{message}}
</div>
{% endfor %}
{% endif %}

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<input type="text" name="username" class="form-control" placeholder="Username or Email" required>
</div>

<div class="mb-3">
<input type="password" name="password" class="form-control" placeholder="Password" required>
</div>

<button class="btn btn-primary">Login</button>

</form>

<div class="signup-link">
Don't have an account? 
<a href="/signup/">Create Account</a>
</div>

</div>

</body>
</html>
