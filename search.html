<!DOCTYPE html>
<html>

<head>

<title>Search Users</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f5f5;
}

.user-card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:15px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0px 2px 8px rgba(0,0,0,0.1);
}

.profile-pic{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover;
margin-right:15px;
}

.user-info{
display:flex;
align-items:center;
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="mb-4">Search Users</h2>

<form method="GET" action="/search/">

<div class="input-group mb-4">

<input type="text"
name="q"
class="form-control"
placeholder="Search username">

<button class="btn btn-primary">
Search
</button>

</div>

</form>

{% for user in users %}

<div class="user-card">

<div class="user-info">

{% if user.profile.profile_pic %}
<img src="{{user.profile.profile_pic.url}}" class="profile-pic">
{% else %}
<img src="https://via.placeholder.com/70" class="profile-pic">
{% endif %}

<div>

<h5>{{user.username}}</h5>

<a href="/profile/{{user.id}}/" class="btn btn-sm btn-dark">
View Profile
</a>

</div>

</div>

</div>

{% empty %}

<p>No users found</p>

{% endfor %}

</div>

</body>

</html>
