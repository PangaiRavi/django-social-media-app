<!DOCTYPE html>
<html>

<head>

<title>Edit Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f0f2f5;
font-family:Arial;
}

.edit-box{
width:500px;
margin:auto;
margin-top:50px;
background:white;
padding:35px;
border-radius:20px;
box-shadow:0px 4px 12px rgba(0,0,0,0.1);
}

.profile-preview{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid #ddd;
display:block;
margin:auto;
margin-bottom:20px;
}

.form-control{
border-radius:10px;
padding:10px;
}

.btn-save{
border-radius:10px;
padding:10px;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="edit-box">

<h2 class="text-center mb-4">
Edit Profile
</h2>

{% if request.user.profile.profile_pic %}
<img src="{{request.user.profile.profile_pic.url}}"
class="profile-preview">
{% else %}
<img src="https://via.placeholder.com/120"
class="profile-preview">
{% endif %}

<form method="POST"
enctype="multipart/form-data"
autocomplete="off">

{% csrf_token %}

<!-- Hidden fields to stop Chrome autofill -->

<input type="text" style="display:none">
<input type="password" style="display:none">

<label class="mb-1">
Username
</label>

<input type="text"
name="new_username"
class="form-control mb-3"
placeholder="Enter new username"
autocomplete="off">

<label class="mb-1">
Email
</label>

<input type="email"
name="new_email"
class="form-control mb-3"
placeholder="Enter new email"
autocomplete="off">

<label class="mb-1">
New Password
</label>

<input type="password"
name="password"
class="form-control mb-3"
placeholder="Enter new password"
autocomplete="new-password">

<label class="mb-1">
Upload Profile Picture
</label>

<input type="file"
name="profile_pic"
class="form-control mb-4">

<button class="btn btn-primary w-100 btn-save">
Update Profile
</button>

</form>

<br>

<a href="/profile/{{request.user.id}}/"
class="btn btn-dark w-100">
Back To Profile
</a>

</div>

</body>

</html>
